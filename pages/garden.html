<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta content="width=device-width, initial-scale=1.0" name="viewport" />
  <title>BULLY — GARDEN</title>
  <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;700;900&family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black: #000000;
      --surface: #131313;
      --surface-lowest: #0e0e0e;
      --primary: #ffffff;
      --outline: #8e9192;
      --outline-variant: #444748;
      --error: #CC2228;
      --on-primary: #2f3131;
    }
    html, body { height: 100%; background: var(--black); color: var(--primary); overflow: hidden; }
    body { font-family: 'Space Grotesk', sans-serif; -webkit-font-smoothing: antialiased; }

    nav {
      position: fixed; top: 0; width: 100%; z-index: 50;
      display: flex; justify-content: space-between; align-items: center;
      padding: 0 32px; height: 80px;
      background: rgba(19, 19, 19, 0.7); backdrop-filter: blur(12px);
      border-bottom: 1px solid rgba(68, 71, 72, 0.2);
    }
    .nav-logo {
      background: var(--primary); color: var(--surface);
      padding: 4px 16px; font-family: 'Epilogue', sans-serif;
      font-weight: 900; font-size: 24px; text-transform: uppercase;
      letter-spacing: -0.05em; text-decoration: none;
    }
    .nav-links { display: flex; gap: 32px; align-items: center; }
    .nav-links a {
      font-family: 'Epilogue', sans-serif; text-transform: uppercase;
      font-weight: 900; letter-spacing: -0.05em; font-size: 14px;
      text-decoration: none; padding: 2px 8px; transition: none;
    }
    .nav-links a.active { color: var(--primary); border-bottom: 2px solid var(--primary); padding-bottom: 4px; }
    .nav-links a:not(.active) { color: var(--outline); }
    .nav-links a:not(.active):hover { background: var(--primary); color: var(--surface); }

    canvas { display: block; width: 100vw; height: 100vh; }

    .garden-title {
      position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
      font-family: 'Epilogue', sans-serif; font-weight: 900;
      font-size: clamp(32px, 6vw, 72px); letter-spacing: -0.05em;
      text-transform: uppercase; color: rgba(255,255,255,0.12);
      pointer-events: none; user-select: none; z-index: 10;
      text-shadow: 0 0 60px rgba(255,255,255,0.05);
    }

    .nav-burger {
      display: none; background: none; border: none; cursor: pointer;
      flex-direction: column; gap: 5px; padding: 8px;
    }
    .nav-burger span {
      display: block; width: 24px; height: 2px; background: var(--primary);
      transition: transform 0.2s, opacity 0.2s;
    }
    .nav-burger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
    .nav-burger.open span:nth-child(2) { opacity: 0; }
    .nav-burger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }
    .mobile-menu {
      display: none; position: fixed; top: 80px; left: 0; right: 0; z-index: 49;
      background: var(--surface); border-bottom: 1px solid rgba(68, 71, 72, 0.2);
      flex-direction: column; padding: 16px 32px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      font-family: 'Epilogue', sans-serif; font-weight: 900; font-size: 16px;
      text-transform: uppercase; letter-spacing: -0.05em; text-decoration: none;
      color: var(--outline); padding: 16px 0;
      border-bottom: 1px solid rgba(68, 71, 72, 0.15);
    }
    .mobile-menu a:last-child { border-bottom: none; }
    .mobile-menu a.active { color: var(--primary); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .nav-burger { display: flex; }
    }
  </style>
</head>
<body>
  <nav>
    <a href="/" class="nav-logo">BULLY</a>
    <div class="nav-links">
      <a href="/">HOME</a>
      <a href="/tracklist">TRACKLIST</a>
      <a href="/lyrics">LYRICS</a>
      <a href="/garden" class="active">GARDEN</a>
    </div>
    <button class="nav-burger" id="nav-burger" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="mobile-menu" id="mobile-menu">
    <a href="/">HOME</a>
    <a href="/tracklist">TRACKLIST</a>
    <a href="/lyrics">LYRICS</a>
    <a href="/garden" class="active">GARDEN</a>
  </div>

  <canvas id="garden"></canvas>
  <div class="garden-title">BULLY</div>

  <script>
    document.getElementById('nav-burger').addEventListener('click', function() {
      this.classList.toggle('open');
      document.getElementById('mobile-menu').classList.toggle('open');
    });
  </script>
  <script type="module" src="./garden.ts"></script>
</body>
</html>
